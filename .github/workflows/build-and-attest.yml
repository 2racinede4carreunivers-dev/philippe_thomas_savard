name: Build LaTeX and Generate Attestation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install minimal TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended

      - name: Compile LaTeX
        run: |
          pdflatex -interaction=nonstopmode temoignage_philippe_thomas_savard.tex
          pdflatex -interaction=nonstopmode temoignage_philippe_thomas_savard.tex


      - name: Generate cryptographic attestation (SHA-256)
        run: |
          sha256sum main.pdf > ATTTESTATION_SHA256.txt

      - name: Update CHANGELOG.md
        run: |
          echo "## $(date +'%Y-%m-%d %H:%M:%S')" >> CHANGELOG.md
          echo "- Compilation automatique du PDF" >> CHANGELOG.md
          echo "- Attestation cryptographique SHA-256 générée" >> CHANGELOG.md
          echo "" >> CHANGELOG.md

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add CHANGELOG.md ATTTESTATION_SHA256.txt main.pdf
          git commit -m "Compilation automatique + attestation cryptographique"
          git push
